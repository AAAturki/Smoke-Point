<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<title>Smoke Point</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  :root{
    --bg:#120D0B; --bg-soft:#1B1512; --panel:#211914; --panel-alt:#2A211A;
    --ink:#F1E6D8; --ink-soft:#A8998A; --line:#3B2E26;
    --ember:#E2793A; --ember-dark:#A85423; --gold:#D9A441; --good:#6B9E7C; --rust:#C1432E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;}
  [dir=ltr] body{font-family:'Cairo',sans-serif;}
  .app{max-width:1180px;margin:0 auto;padding:26px 20px 60px;}

  .hdr{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;
    border:1px solid var(--line);border-radius:8px;padding:22px 24px;
    background:radial-gradient(120% 160% at 15% 20%, #2c1f16 0%, #17110d 55%, #120D0B 100%);}
  .hdr::before{content:'';position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(60% 80% at 85% 0%, rgba(226,121,58,0.18), transparent 70%);}
  .hdr h1{font-family:'Cairo',sans-serif;font-weight:800;font-size:30px;margin:0;letter-spacing:0.5px;
    color:var(--ember);text-shadow:0 0 14px rgba(226,121,58,0.55), 0 0 2px rgba(226,121,58,0.8);position:relative;z-index:1;}
  .hdr .sub{color:var(--ink-soft);font-size:13px;margin-top:4px;position:relative;z-index:1;}
  .hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;position:relative;z-index:1;}
  [dir=ltr] .hdr-right{align-items:flex-start;}
  .savebadge{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--good);opacity:0;transition:opacity .3s;}
  .savebadge.show{opacity:1;}
  .livebadge{font-size:11px;color:var(--good);}
  .userline{font-size:12px;color:var(--gold);display:flex;align-items:center;gap:8px;}
  .langbtn,.logoutbtn{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;
    background:var(--bg-soft);color:var(--gold);border:1px solid var(--line);border-radius:4px;padding:6px 12px;cursor:pointer;}
  .langbtn:hover,.logoutbtn:hover{border-color:var(--gold);}
  .toprow{display:flex;gap:8px;}

  .nav{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
  .tag{position:relative;font-family:'Cairo',sans-serif;font-weight:600;font-size:14.5px;
    background:var(--bg-soft);color:var(--ink-soft);border:1px solid var(--line);border-radius:4px;
    padding:10px 30px 10px 18px;cursor:pointer;transition:all .15s;}
  [dir=ltr] .tag{padding:10px 18px 10px 30px;}
  .tag::before{content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);
    width:7px;height:7px;border-radius:50%;background:var(--bg);border:1px solid #555;}
  [dir=ltr] .tag::before{right:auto;left:12px;}
  .tag .lockicon{margin-inline-start:6px;font-size:12px;opacity:.7;}
  .tag:hover{color:var(--ink);border-color:var(--ember);}
  .tag.active{background:var(--ember);color:#1a0f06;border-color:var(--ember);}
  .tag.active::before{background:#1a0f06;border-color:#1a0f06;box-shadow:0 0 6px rgba(226,121,58,0.8);}

  .panel{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:22px;}

  .stamps{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stamp{border:1px dashed var(--line);border-radius:5px;padding:12px 14px;background:var(--panel-alt);}
  .stamp .label{font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  .stamp .value{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--gold);direction:ltr;text-align:right;}
  [dir=ltr] .stamp .value{text-align:left;}
  .stamp .value.income-val{color:var(--good);}
  .coins-flag{background:#4a3c14;border:1px solid #8f6c22;color:#e8c469;font-size:12px;padding:6px 10px;border-radius:4px;margin-top:8px;line-height:1.6;}
  .coins-flag.cc-short{background:#4a2c14;border-color:var(--ember);color:#f2a05e;}
  .coins-flag.cc-surplus{background:#1c2e22;border-color:var(--good);color:#8fc7a2;}
  .badge.cc-short-badge{background:var(--ember);color:#1a0f06;}
  .badge.cc-surplus-badge{background:var(--good);color:#0e1c14;}
  .notif{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;margin-bottom:12px;cursor:pointer;font-size:13.5px;transition:opacity .15s;}
  .notif:hover{opacity:.85;}
  .notif.warn{background:#4a3c14;border:1px solid #8f6c22;color:#e8c469;}
  .notif.alert{background:#3a1f18;border:1px solid var(--rust);color:#e79080;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-dow{font-size:10.5px;color:var(--ink-soft);text-align:center;padding:2px 0;}
  .cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;background:var(--panel-alt);
    font-family:'IBM Plex Mono',monospace;font-size:12px;border:1px solid var(--line);}
  .cal-cell.cal-closed{background:var(--good);color:#0e1c14;font-weight:700;border-color:var(--good);}
  .cal-cell.cal-empty{background:transparent;border:none;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
  input[type=text],input[type=number],input[type=tel],input[type=password],input[type=date],select,textarea{
    font-family:'Tajawal',sans-serif;border:1px solid var(--line);border-radius:4px;padding:8px 10px;
    background:var(--bg-soft);color:var(--ink);font-size:14px;}
  [dir=ltr] input,[dir=ltr] select,[dir=ltr] textarea{font-family:'Cairo',sans-serif;}
  input::placeholder,textarea::placeholder{color:var(--ink-soft);}
  .search{width:220px;}
  .btn{font-family:'Cairo',sans-serif;font-weight:600;font-size:13px;background:var(--ember);color:#1a0f06;
    border:none;border-radius:4px;padding:9px 16px;cursor:pointer;transition:opacity .15s;}
  .btn:hover{opacity:0.85;}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn.danger{background:var(--rust);color:#fff;}
  .btn.sage{background:var(--good);color:#0e1c14;}
  .btn.small{padding:5px 10px;font-size:12px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{text-align:right;font-size:11.5px;color:var(--ink-soft);border-bottom:2px solid var(--ember-dark);padding:8px 10px;}
  [dir=ltr] thead th{text-align:left;}
  tbody td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:hover{background:var(--panel-alt);}
  .mono{font-family:'IBM Plex Mono',monospace;direction:ltr;text-align:right;}
  [dir=ltr] .mono{text-align:left;}
  .low{color:var(--rust);font-weight:700;}
  .badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;padding:2px 7px;border-radius:10px;color:#fff;}
  .badge.good{background:var(--good);color:#0e1c14;}
  .badge.mid{background:var(--gold);color:#1a0f06;}
  .badge.low{background:var(--rust);}
  .badge.in{background:var(--good);color:#0e1c14;}
  .badge.out{background:var(--rust);}
  .rowactions{display:flex;gap:6px;}
  .iconbtn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--ink-soft);padding:3px 5px;}
  .iconbtn:hover{color:var(--ember);}

  .empty{text-align:center;padding:40px 10px;color:var(--ink-soft);font-family:'Cairo',sans-serif;font-size:16px;}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .card{border:1px solid var(--line);border-radius:5px;padding:14px;background:var(--panel-alt);position:relative;}
  .card .name{font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;}
  .card .role{font-size:12px;color:var(--gold);margin:2px 0 8px;}
  .card .phone{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink-soft);direction:ltr;text-align:right;}
  [dir=ltr] .card .phone{text-align:left;}
  .card .rowactions{position:absolute;top:10px;left:10px;}
  [dir=ltr] .card .rowactions{left:auto;right:10px;}

  .schedwrap{overflow-x:auto;}
  .weeknav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .weeknav .lbl{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold);}
  .schedtable{border-collapse:collapse;width:100%;min-width:760px;}
  .schedtable th{font-family:'Cairo',sans-serif;font-size:12px;padding:8px;border-bottom:2px solid var(--ember-dark);text-align:center;}
  .schedtable th:first-child{text-align:right;} [dir=ltr] .schedtable th:first-child{text-align:left;}
  .schedtable td{border:1px solid var(--line);text-align:center;padding:4px;}
  .schedtable td:first-child{text-align:right;padding:8px 10px;font-weight:600;border:none;border-bottom:1px solid var(--line);}
  [dir=ltr] .schedtable td:first-child{text-align:left;}
  .cell{width:70px;min-height:34px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;
    display:flex;align-items:center;justify-content:center;transition:background .1s;border-radius:3px;margin-bottom:3px;}
  .cell.M{background:#3a2f1c;color:var(--gold);}
  .cell.N{background:#221830;color:#b79ce0;}
  .hourbox{width:56px;font-size:11px;padding:3px 4px;text-align:center;}
  .totalcol{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--gold);}
  .legend{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .swatch{width:11px;height:11px;border-radius:2px;display:inline-block;}
  .overalltable{margin-top:22px;}

  .overlay{position:fixed;inset:0;background:rgba(10,7,5,0.75);display:none;align-items:center;justify-content:center;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:24px;width:340px;max-width:90vw;}
  .modal h3{font-family:'Cairo',sans-serif;margin:0 0 14px;font-size:19px;color:var(--ember);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
  .field input,.field select,.field textarea{width:100%;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;justify-content:flex-start;gap:8px;margin-top:16px;}

  .lockwrap{max-width:320px;margin:30px auto;text-align:center;}
  .lockwrap .icon{font-size:34px;margin-bottom:10px;}
  .lockwrap h3{font-family:'Cairo',sans-serif;margin:0 0 6px;font-size:19px;color:var(--ember);}
  .lockwrap p{font-size:13px;color:var(--ink-soft);margin:0 0 16px;}
  .lockwrap input{width:100%;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:20px;letter-spacing:6px;padding:10px;margin-bottom:10px;}
  .lockerr{color:var(--rust);font-size:12.5px;min-height:16px;margin-bottom:8px;}
  .lockwrap .altlink{display:block;margin-top:14px;font-size:12px;color:var(--ink-soft);text-decoration:underline;cursor:pointer;background:none;border:none;}

  .reqform{display:grid;grid-template-columns:1fr 1.3fr 1fr 1fr 0.9fr;gap:10px;align-items:end;margin-bottom:8px;}
  .reqform .field{margin-bottom:0;}
  .toggle{display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .toggle button{flex:1;border:none;background:var(--bg-soft);padding:8px 6px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;color:var(--ink-soft);}
  [dir=ltr] .toggle button{font-family:'Cairo',sans-serif;}
  .toggle button.active{background:var(--ember);color:#1a0f06;}
  .toggle button.active.out{background:var(--rust);color:#fff;}
  .toggle button.active.in{background:var(--good);color:#0e1c14;}
  .hint{font-size:12px;color:var(--ink-soft);margin:6px 0 14px;}
  .status{font-size:13px;padding:8px 10px;border-radius:4px;margin-bottom:12px;display:none;}
  .status.show{display:block;}
  .status.err{background:#3a1f18;color:#e79080;border:1px solid var(--rust);}
  .status.ok{background:#1c2e22;color:#8fc7a2;border:1px solid var(--good);}

  .noteform{display:grid;grid-template-columns:1fr 1fr 2fr;gap:10px;margin-bottom:10px;}
  .notecard{border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-bottom:10px;background:var(--panel-alt);}
  .notecard .meta{font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
  .notecard .txt{font-size:14px;margin-bottom:8px;}
  .notecard img{max-width:220px;border-radius:5px;border:1px solid var(--line);display:block;}

  .chatwrap{display:flex;flex-direction:column;height:420px;}
  .chatlist{flex:1;overflow-y:auto;border:1px solid var(--line);border-radius:6px;padding:12px;background:var(--bg-soft);margin-bottom:10px;}
  .msg{margin-bottom:10px;}
  .msg .who{font-size:11.5px;color:var(--gold);font-family:'IBM Plex Mono',monospace;}
  .msg .txt{font-size:14px;background:var(--panel-alt);display:inline-block;padding:6px 10px;border-radius:6px;margin-top:2px;}
  .chatinput{display:flex;gap:8px;}
  .chatinput input{flex:1;}

  @media(max-width:760px){ .reqform{grid-template-columns:1fr 1fr;} .noteform{grid-template-columns:1fr;} }
  @media(max-width:640px){
    .stamps{grid-template-columns:repeat(2,1fr);}
    .hdr{flex-direction:column;align-items:flex-start;gap:10px;}
    .hdr-right{align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div>
      <h1 id="titleText">Smoke Point</h1>
      <div class="sub" id="subText">متجر التدخين — المخزون والموظفين</div>
    </div>
    <div class="hdr-right">
      <div class="toprow">
        <button class="langbtn" onclick="toggleLang()" id="langBtn">EN</button>
        <button class="logoutbtn" id="logoutBtn" onclick="doLogout()" style="display:none;"></button>
      </div>
      <div class="userline" id="userLine" style="display:none;"></div>
      <div class="savebadge" id="saveBadge">saved</div>
      <div class="livebadge" id="liveText">● live</div>
      <div id="errBanner" style="display:none;font-size:11px;color:#e79080;max-width:260px;text-align:end;"></div>
    </div>
  </div>

  <div class="nav" id="navBar"></div>
  <div id="notifBar"></div>
  <div class="panel" id="panel"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

async function persist(key, value, _attempt){
  _attempt = _attempt || 1;
  try{
    await stateDoc(key).set({ items: value, updatedAt: FieldValue.serverTimestamp() });
    const b = document.getElementById('saveBadge');
    b.textContent = t('saved'); b.classList.add('show');
    clearTimeout(window._saveT); window._saveT = setTimeout(()=>b.classList.remove('show'), 1200);
  }catch(e){
    if(_attempt < 3){
      await new Promise(res=>setTimeout(res, 400*_attempt));
      return persist(key, value, _attempt+1);
    }
    showStorageError(key, e);
  }
}
// Transaction-safe stock adjustment: prevents two simultaneous requests from clobbering each other's quantity change.
async function adjustInventoryQty(itemId, deltaPieces){
  const ref = stateDoc('inventory');
  return db.runTransaction(async (tx) => {
    const snap = await tx.get(ref);
    const items = snap.exists ? (snap.data().items || []) : [];
    const idx = items.findIndex(i=>i.id===itemId);
    if(idx===-1) throw new Error('item-not-found');
    const newQty = (Number(items[idx].qty)||0) + deltaPieces;
    if(newQty < 0){ const err = new Error('insufficient-stock'); err.available = items[idx].qty; throw err; }
    const newItems = items.slice();
    newItems[idx] = {...newItems[idx], qty: newQty};
    tx.set(ref, { items: newItems, updatedAt: FieldValue.serverTimestamp() });
    return newQty;
  });
}

function downloadBlob(filename, content, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}

function toCSV(headers, rows){

  return [headers.map(esc).join(','), ...rows.map(r=>r.map(esc).join(','))].join('\r\n');

async function importCollection(name, arr){
  const colRef = db.collection(name);
  const existing = await colRef.get();
  const docs = existing.docs;
  for(let i=0; i<docs.length; i+=400){
    const batch = db.batch();
    docs.slice(i,i+400).forEach(d=>batch.delete(d.ref));
    await batch.commit();
  }
  const items = arr || [];
  for(let i=0; i<items.length; i+=400){
    const batch = db.batch();
    items.slice(i,i+400).forEach(item=>{
      const { id, ...rest } = item;
      batch.set(colRef.doc(), { ...rest, ts: FieldValue.serverTimestamp() });
    });
    await batch.commit();
  }
}

  const reader = new FileReader();
  reader.onload = (e) => {
    let data;
    try{ data = JSON.parse(e.target.result); }
    catch(err){ document.getElementById('importMsg').textContent = t('import_error'); return; }
    openConfirm(t('confirm_import'), async ()=>{
      try{
        await persist('inventory', data.inventory || []);
        await persist('staff', data.staff || []);
        await persist('schedules', data.schedules || {});
        await persist('settings', data.settings || {lowStock:5});
        await importCollection('freechoice_requests', data.requests || []);
        await importCollection('freechoice_notes', data.notes || []);
        await importCollection('freechoice_chat', data.chat || []);
        await importCollection('freechoice_closings', data.closings || []);
      }catch(err){ showStorageError('import', err); }
      render();
    });
  };
  reader.readAsText(file);
}

function renderInventory(){
  const cats = Array.from(new Set(state.inventory.map(categoryOf))).sort((a,b)=> a==='__none__'?1 : b==='__none__'?-1 : a.localeCompare(b));
  if(!cats.includes(invCategoryFilter)) invCategoryFilter = '__all__';
  let items = state.inventory.filter(i =>
    !invSearch || i.name.toLowerCase().includes(invSearch.toLowerCase()) || (i.sku||'').toLowerCase().includes(invSearch.toLowerCase())
  );
  if(invCategoryFilter !== '__all__'){ items = items.filter(i => categoryOf(i) === invCategoryFilter); }
  if(invSort==='qty_asc') items = items.slice().sort((a,b)=> Number(a.qty||0) - Number(b.qty||0));
  else if(invSort==='qty_desc') items = items.slice().sort((a,b)=> Number(b.qty||0) - Number(a.qty||0));
  else if(invSort==='category') items = items.slice().sort((a,b)=> categoryOf(a).localeCompare(categoryOf(b)) || a.name.localeCompare(b.name));
  else items = items.slice().sort((a,b)=> a.name.localeCompare(b.name));

  const totalUnits = items.reduce((s,i)=>s+Number(i.qty||0),0);
  const totalCost = items.reduce((s,i)=>s+Number(i.qty||0)*Number(i.cost||0),0);
  const totalRetail = items.reduce((s,i)=>s+Number(i.qty||0)*Number(i.price||0),0);
  const profit = totalRetail - totalCost;
  let rows = items.map(i => {
    const margin = Number(i.price||0) - Number(i.cost||0);
    const marginPct = i.price ? (margin / Number(i.price) * 100) : 0;
    const badgeClass = marginPct >= 30 ? 'good' : marginPct >= 15 ? 'mid' : 'low';
    const low = Number(i.qty) <= Number(state.settings.lowStock);
    return `<tr>
      <td>${escapeHtml(i.name)}</td><td class="mono">${escapeHtml(i.sku||'—')}</td><td>${escapeHtml(i.category||'—')}</td>
      <td class="mono">${fmt(i.cost)}</td><td class="mono">${fmt(i.price)}</td>
      <td><span class="badge ${badgeClass}">${marginPct.toFixed(0)}%</span></td>
      <td class="mono ${low?'low':''}">${i.qty}${low?' ⚠':''}</td><td class="mono">${i.unitsPerCarton||1}</td>
      <td><div class="rowactions"><button class="iconbtn" onclick="openItemForm('${i.id}')">✎</button><button class="iconbtn" onclick="deleteItem('${i.id}')">✕</button></div></td>
    </tr>`;
  }).join('');
  if(!items.length){ rows = `<tr><td colspan="9"><div class="empty">${state.inventory.length? t('empty_search') : t('empty_items')}</div></td></tr>`; }

  const catOptions = `<option value="__all__" ${invCategoryFilter==='__all__'?'selected':''}>${t('all_categories')}</option>` +
    cats.map(c=>`<option value="${escapeHtml(c)}" ${c===invCategoryFilter?'selected':''}>${c==='__none__'?t('uncategorized'):escapeHtml(c)}</option>`).join('');

  return `
    <div class="toolbar">
      <div style="font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;">${t('inv_heading')}</div>
      <div style="display:flex;gap:8px;">
        <button class="btn ghost small" onclick="exportInventoryCSV()">${t('export_btn')}</button>
      </div>
    </div>
    <div class="stamps">
      <div class="stamp"><div class="label">${t('s_items')}</div><div class="value">${items.length}</div></div>
      <div class="stamp"><div class="label">${t('s_units')}</div><div class="value">${totalUnits}</div></div>
      <div class="stamp"><div class="label">${t('s_cost')}</div><div class="value">${fmt(totalCost)}</div></div>
      <div class="stamp"><div class="label">${t('s_profit')}</div><div class="value">${fmt(profit)}</div></div>
    </div>
    <div class="toolbar">
      <input id="invSearchInput" type="text" class="search" placeholder="${t('search_ph')}" value="${escapeHtml(invSearch)}" oninput="updateInvSearch(this.value)">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <label style="font-size:12px;color:var(--ink-soft);">${t('lowstock_lbl')}
          <input type="number" class="mono" style="width:56px;margin-inline-start:4px;" value="${state.settings.lowStock}" onchange="updateLowStock(this.value)">
        </label>
        <button class="btn" onclick="openItemForm()">${t('add_item')}</button>
      </div>
    </div>
    <div class="toolbar">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <label style="font-size:12px;color:var(--ink-soft);">${t('filter_by_cat')}
          <select style="margin-inline-start:4px;" onchange="invCategoryFilter=this.value;render()">${catOptions}</select>
        </label>
        <label style="font-size:12px;color:var(--ink-soft);">${t('sort_by')}
          <select style="margin-inline-start:4px;" onchange="invSort=this.value;render()">
            <option value="name" ${invSort==='name'?'selected':''}>${t('sort_name')}</option>
            <option value="category" ${invSort==='category'?'selected':''}>${t('sort_cat')}</option>
            <option value="qty_asc" ${invSort==='qty_asc'?'selected':''}>${t('sort_qty_asc')}</option>
            <option value="qty_desc" ${invSort==='qty_desc'?'selected':''}>${t('sort_qty_desc')}</option>
          </select>
        </label>
      </div>
    </div>
    <table><thead><tr><th>${t('th_name')}</th><th>${t('th_sku')}</th><th>${t('th_cat')}</th><th>${t('th_cost')}</th><th>${t('th_price')}</th><th>${t('th_margin')}</th><th>${t('th_qty')}</th><th>${t('th_upc')}</th><th></th></tr></thead><tbody>${rows}</tbody></table>
  `;
}

function saveItem(id){

function categoryOf(item){ return (item.category && item.category.trim()) ? item.category.trim() : '__none__'; }
function getRequestCategories(){
  const set = new Set(state.inventory.map(categoryOf));
  return Array.from(set).sort((a,b)=> a==='__none__'?1 : b==='__none__'?-1 : a.localeCompare(b));
}
function renderRequests(){
  const cats = getRequestCategories();
  if(!reqCategory || !cats.includes(reqCategory)) reqCategory = cats[0] || null;
  const itemsInCat = state.inventory.filter(i => categoryOf(i) === reqCategory);
  if(!reqItemId || !itemsInCat.some(i=>i.id===reqItemId)) reqItemId = itemsInCat[0]?.id || null;
  const catOptions = cats.map(c=>`<option value="${escapeHtml(c)}" ${c===reqCategory?'selected':''}>${c==='__none__'?t('uncategorized'):escapeHtml(c)}</option>`).join('');
  const options = itemsInCat.map(i=>`<option value="${i.id}" ${i.id===reqItemId?'selected':''}>${escapeHtml(i.name)}</option>`).join('');
  const statusHtml = reqStatus ? `<div class="status show ${reqStatus.type}">${reqStatus.msg}</div>` : '';
  return `
    <div style="font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;margin-bottom:14px;">${t('req_heading')}</div>
    ${!state.inventory.length ? `<div class="empty">${t('req_noitems')}</div>` : `
    ${statusHtml}
    <div class="reqform">
      <div class="field"><label>${t('f_cat')}</label><select id="r_cat" onchange="setReqCategory(this.value)">${catOptions}</select></div>
      <div class="field"><label>${t('f_item')}</label><select id="r_item" onchange="reqItemId=this.value;renderReqHint()">${options}</select></div>
      <div class="field"><label>${t('f_action')}</label><div class="toggle">
        <button class="${reqAction==='out'?'active out':''}" onclick="setReqAction('out')">${t('a_out')}</button>
        <button class="${reqAction==='in'?'active in':''}" onclick="setReqAction('in')">${t('a_in')}</button></div></div>
      <div class="field"><label>${t('f_unit')}</label><div class="toggle">
        <button class="${reqUnit==='piece'?'active':''}" onclick="setReqUnit('piece')">${t('u_piece')}</button>
        <button class="${reqUnit==='carton'?'active':''}" onclick="setReqUnit('carton')">${t('u_carton')}</button></div></div>
      <div class="field"><label>${t('f_qtylbl')}</label><input id="r_qty" type="number" min="1" value="${escapeHtml(String(reqQty))}" oninput="reqQty=this.value"></div>
    </div>
    <div class="field" style="max-width:340px;"><label>${t('f_note')}</label><input id="r_note" type="text" placeholder="${t('note_ph')}" value="${escapeHtml(reqNoteVal)}" oninput="reqNoteVal=this.value"></div>
    <div class="hint" id="r_hint"></div>
    <button class="btn" onclick="submitRequest()">${t('submit')}</button>
    `}`;
}
function setReqCategory(c){ reqCategory = c; reqItemId = null; render(); setTimeout(renderReqHint,0); }
function setReqAction(a){ reqAction = a; render(); setTimeout(renderReqHint,0); }
function setReqUnit(u){ reqUnit = u; render(); setTimeout(renderReqHint,0); }
function renderReqHint(){
  const sel = document.getElementById('r_item'); const hint = document.getElementById('r_hint');
  if(!sel || !hint) return;
  const item = state.inventory.find(i=>i.id===sel.value);
  if(!item) return;
  hint.textContent = t('hint_avail', item.qty, item.unitsPerCarton||1);
}
async function submitRequest(){
  const itemId = reqItemId;
  const qty = Number(reqQty);
  const note = reqNoteVal.trim();
  const item = state.inventory.find(i=>i.id===itemId);
  if(!item || !qty || qty<=0){ reqStatus = {type:'err', msg:t('err_choose')}; render(); return; }
  const qtyInPieces = reqUnit==='carton' ? qty * (item.unitsPerCarton||1) : qty;
  if(reqAction==='out' && qtyInPieces > item.qty){ reqStatus = {type:'err', msg:t('err_insuff', qtyInPieces, item.qty)}; render(); return; }
  const deltaPieces = reqAction==='out' ? -qtyInPieces : qtyInPieces;
  try{
    const newQty = await adjustInventoryQty(item.id, deltaPieces);
    await db.collection('freechoice_requests').add({
      time: new Date().toLocaleString(lang==='ar'?'ar-EG':'en-GB', {hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}),
      itemName: item.name, itemCategory: item.category||'', itemId: item.id, action: reqAction, unit: reqUnit, qty, qtyInPieces, balanceAfter: newQty, note, by: actorName(),
      received: false, ts: FieldValue.serverTimestamp()
    });
    reqStatus = {type:'ok', msg:t('ok_done', newQty)};
    reqQty = '1'; reqNoteVal = '';
  }catch(e){
    if(e.message === 'insufficient-stock'){ reqStatus = {type:'err', msg:t('err_insuff', qtyInPieces, e.available)}; }
    else { showStorageError('requests', e); reqStatus = null; }
  }
  render();
}
async function markReceived(reqId){
  try{
    await db.collection('freechoice_requests').doc(reqId).update({ received: true, receivedBy: actorName(), receivedAt: FieldValue.serverTimestamp() });
  }catch(e){ showStorageError('requests', e); }
}
function toggleReceivedSection(){ receivedSectionOpen = !receivedSectionOpen; render(); }
function renderRequestsLog(){
  const delCol = isAdminUser ? `<th></th>` : '';
  const pending = state.requests.filter(r=>!r.received);

  const rowHtml = (r, showReceiveBtn) => `
    <tr><td class="mono">${r.time}</td><td>${escapeHtml(r.itemName)}</td>
      <td>${escapeHtml(r.itemCategory || t('uncategorized'))}</td>
      <td><span class="badge ${r.action==='out'?'out':'in'}">${r.action==='out'?t('a_out'):t('a_in')}</span></td>
      <td class="mono">${r.qty} ${r.unit==='carton'?t('u_carton'):t('u_piece')}</td>
      <td class="mono">${r.qtyInPieces} ${t('u_piece')}</td><td class="mono">${r.balanceAfter}</td>
      <td>${escapeHtml(r.by||'—')}</td><td>${escapeHtml(r.note||'—')}</td>
      ${showReceiveBtn ? `<td><button class="btn sage small" onclick="markReceived('${r.id}')">${t('mark_received')}</button></td>` : `<td class="mono" style="font-size:11.5px;">${escapeHtml(r.receivedBy||'—')}</td>`}
      ${isAdminUser ? `<td><button class="iconbtn" onclick="deleteRequest('${r.id}')" title="${t('delete_req')}">✕</button></td>` : ''}
    </tr>`;
  const pendingRows = [...pending].reverse().map(r=>rowHtml(r, true)).join('');
  const receivedRows = [...received].reverse().map(r=>rowHtml(r, false)).join('');
  return `
    <div class="toolbar"><div style="font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;">${t('log_title')}</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="livebadge">${t('log_live')}</div>
        <button class="btn ghost small" onclick="exportRequestsCSV()">${t('export_btn')}</button>
      </div>
    </div>
    <div style="font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;margin-bottom:6px;color:var(--gold);">${t('pending_section')} (${pending.length})</div>
    <table><thead><tr><th>${t('th_time')}</th><th>${t('th_item')}</th><th>${t('th_cat')}</th><th>${t('th_type')}</th><th>${t('th_entered')}</th><th>${t('th_equiv')}</th><th>${t('th_balance')}</th><th>${t('th_by')}</th><th>${t('th_note')}</th><th></th>${delCol}</tr></thead>
    <tbody>${pendingRows || `<tr><td colspan="11"><div class="empty">${t('no_pending')}</div></td></tr>`}</tbody></table>

    <div class="toolbar" style="margin-top:24px;cursor:pointer;" onclick="toggleReceivedSection()">
      <div style="font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;color:var(--ink-soft);">${receivedSectionOpen?'▾':lang==='ar'?'◂':'▸'} ${t('received_section')} (${received.length})</div>
    </div>
    ${receivedSectionOpen ? `
    <table><thead><tr><th>${t('th_time')}</th><th>${t('th_item')}</th><th>${t('th_cat')}</th><th>${t('th_type')}</th><th>${t('th_entered')}</th><th>${t('th_equiv')}</th><th>${t('th_balance')}</th><th>${t('th_by')}</th><th>${t('th_note')}</th><th>${t('th_received_by')}</th>${delCol}</tr></thead>
    <tbody>${receivedRows || `<tr><td colspan="11"><div class="empty">${t('log_empty')}</div></td></tr>`}</tbody></table>
    ` : ''}
  `;
}
function deleteRequest(reqId){
  const req = state.requests.find(r=>r.id===reqId);
  if(!req) return;
  document.getElementById('modalBody').innerHTML = `
    <h3>${t('del_req_title')}</h3>
    <p style="font-size:14px;margin-bottom:16px;line-height:1.7;">${t('del_req_desc', req.itemName, req.qtyInPieces)}</p>
    <div class="modal-actions" style="flex-wrap:wrap;">
      <button class="btn danger" onclick="confirmDeleteRequest('${reqId}', true)">${t('del_req_restore')}</button>
      <button class="btn ghost" onclick="confirmDeleteRequest('${reqId}', false)">${t('del_req_only')}</button>
      <button class="btn ghost" onclick="closeModal()">${t('cancel')}</button>
    </div>
  `;
  showModal();
}
async function confirmDeleteRequest(reqId, restore){
  const req = state.requests.find(r=>r.id===reqId);
  closeModal();
  if(!req) return;
  try{
    if(restore && req.itemId){
      const delta = req.action==='out' ? req.qtyInPieces : -req.qtyInPieces;
      await adjustInventoryQty(req.itemId, delta);
    }
    await db.collection('freechoice_requests').doc(reqId).delete();
  }catch(e){ showStorageError('requests', e); }
  render();
}

/* ---------- SCHEDULE ---------- */
function shiftWeek(delta){ const d = new Date(currentWeekStart); d.setDate(d.getDate() + delta*7); currentWeekStart = isoDate(d); render(); }
function cycleShift(staffId, date){
  if(!state.schedules[currentWeekStart]) state.schedules[currentWeekStart] = {};
  if(!state.schedules[currentWeekStart][staffId]) state.schedules[currentWeekStart][staffId] = {};
  const cur = state.schedules[currentWeekStart][staffId][date]?.shift || '';
  const cycle = ['','M','N'];
  const next = cycle[(cycle.indexOf(cur)+1)%cycle.length];
  if(next===''){ delete state.schedules[currentWeekStart][staffId][date]; }
  else{ const prevHours = state.schedules[currentWeekStart][staffId][date]?.hours || 8; state.schedules[currentWeekStart][staffId][date] = { shift: next, hours: prevHours }; }
  persist('schedules', state.schedules); render();
}
function setHours(staffId, date, val){
  const h = Number(val)||0;
  if(state.schedules[currentWeekStart]?.[staffId]?.[date]){ state.schedules[currentWeekStart][staffId][date].hours = h; persist('schedules', state.schedules); render(); }
}
function totalWeekHours(staffId){ return weekDates(currentWeekStart).reduce((s,d)=> s + (state.schedules[currentWeekStart]?.[staffId]?.[d]?.hours || 0), 0); }
function totalOverallHours(staffId){
  let sum = 0;
  Object.values(state.schedules).forEach(week=>{ const rec = week[staffId]; if(rec) Object.values(rec).forEach(entry=>{ sum += Number(entry.hours)||0; }); });
  return sum;
}
function renderSchedule(){
  if(!state.staff.length) return `<div class="empty">${t('sched_nostaff')}</div>`;
  const dates = weekDates(currentWeekStart);
  const dow = t('dow');
  const headerCells = dates.map((d,idx)=>`<th>${dow[idx]}<br><span style="opacity:.6;">${fmtDate(d)}</span></th>`).join('');
  const rows = state.staff.map(s=>{

      const label = shift==='M'?t('shift_m'):shift==='N'?t('shift_n'):t('shift_off');
      return `<td><div class="cell ${shift}" onclick="cycleShift('${s.id}','${d}')" title="${label}">${label}</div>
        ${shift ? `<input type="number" class="hourbox" value="${hours}" min="0" max="24" onclick="event.stopPropagation()" onchange="setHours('${s.id}','${d}', this.value)">` : ''}</td>`;
    }).join('');
    return `<tr><td>${escapeHtml(s.name)}</td>${cells}<td class="totalcol">${totalWeekHours(s.id)}</td></tr>`;
  }).join('');
  const overallRows = state.staff.map(s=>`<tr><td>${escapeHtml(s.name)}</td><td class="mono">${totalOverallHours(s.id)}</td></tr>`).join('');
  const grandTotal = state.staff.reduce((sum,s)=>sum+totalWeekHours(s.id),0);
  return `
    <div class="weeknav">
      <button class="btn ghost small" onclick="shiftWeek(-1)">${lang==='ar'?'▶':'◀'}</button>
      <span class="lbl">${t('week_lbl')}: ${fmtDate(dates[0])} – ${fmtDate(dates[6])}</span>
      <button class="btn ghost small" onclick="shiftWeek(1)">${lang==='ar'?'◀':'▶'}</button>
      <button class="btn ghost small" style="margin-inline-start:auto;" onclick="exportSchedulesJSON()">${t('export_btn')}</button>
    </div>
    <div class="stamps" style="grid-template-columns:1fr;margin-bottom:16px;">
      <div class="stamp"><div class="label">${t('grand_total_label')}</div><div class="value">${grandTotal}</div></div>
    </div>
    <div class="schedwrap"><table class="schedtable">
      <thead><tr><th>${t('th_staff')}</th>${headerCells}<th>${t('th_total')}</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <div class="legend">
      <span><span class="swatch" style="background:#3a2f1c;"></span> ${t('shift_m')}</span>

/* ---------- DAILY TILL CLOSING ---------- */
function getPrevEntry(dateStr, excludeId){
  const prior = state.closings.filter(c=>c.date && c.date < dateStr && c.id !== excludeId);
  if(!prior.length) return null;
  let best = prior[0];
  for(const c of prior){ if(c.date >= best.date) best = c; }
  return best;
}
function computeClosing(vals, excludeId){
  const prev = getPrevEntry(vals.date, excludeId);
  const prevTill = prev ? Number(prev.till)||0 : 0;
  const prevCoins = prev ? Number(prev.coins)||0 : 0;
  const coinsDiff = Math.max(0, prevCoins - Number(vals.coins||0));
  const income = Number(vals.till||0) + Number(vals.eft||0) + Number(vals.notesAmt||0) + Number(vals.changes||0) - coinsDiff - Number(vals.expenses||0) - prevTill;
  const cash = Number(vals.eft||0) - income;
  const ccDiff = income - Number(vals.cc||0); // >0 = surplus (زيادة), <0 = shortage (نقص)
  return { prevTill, prevCoins, coinsDiff, income, cash, ccDiff };
}
function readClosingForm(){
  return {
    date: document.getElementById('cl_date').value,
    till: Number(document.getElementById('cl_till').value)||0,
    coins: Number(document.getElementById('cl_coins').value)||0,
    eft: Number(document.getElementById('cl_eft').value)||0,
    notesAmt: Number(document.getElementById('cl_notes').value)||0,
    cc: Number(document.getElementById('cl_cc').value)||0,
    expenses: Number(document.getElementById('cl_expenses').value)||0,
    changes: Number(document.getElementById('cl_changes').value)||0,
  };
}
function recalcClosing(){
  const dateEl = document.getElementById('cl_date');
  if(!dateEl) return;
  const vals = readClosingForm();
  const r = computeClosing(vals, editingClosingId);
  const incomeOut = document.getElementById('cl_income_out');
  const cashOut = document.getElementById('cl_cash_out');
  if(incomeOut) incomeOut.textContent = fmt(r.income);
  if(cashOut) cashOut.textContent = fmt(r.cash);
  const flag = document.getElementById('cl_coins_flag');
  if(flag){
    if(r.coinsDiff > 0){ flag.style.display='block'; flag.textContent = t('coins_taken_hint', fmt(r.coinsDiff)); }
    else { flag.style.display='none'; }
  }
  const ccFlag = document.getElementById('cl_cc_flag');
  if(ccFlag){
    if(Math.abs(r.ccDiff) < 0.005){ ccFlag.style.display='none'; }
    else if(r.ccDiff < 0){ ccFlag.style.display='block'; ccFlag.className='coins-flag cc-short'; ccFlag.textContent = t('cc_short_hint', fmt(Math.abs(r.ccDiff))); }
    else { ccFlag.style.display='block'; ccFlag.className='coins-flag cc-surplus'; ccFlag.textContent = t('cc_surplus_hint', fmt(r.ccDiff)); }
  }
  const hint = document.getElementById('cl_prevtill_hint');
  if(hint) hint.textContent = t('prev_till_hint', fmt(r.prevTill));
}
async function submitClosing(){
  const vals = readClosingForm();
  if(!vals.date){ document.getElementById('closingErr').textContent = t('date_required'); return; }
  const r = computeClosing(vals);
  try{
    await db.collection('freechoice_closings').add({
      ...vals, prevTill: r.prevTill, coinsDiff: r.coinsDiff, income: r.income, cash: r.cash,
      author: actorName(), ts: FieldValue.serverTimestamp()
    });
    render();
  }catch(e){ showStorageError('closings', e); }
}
async function updateClosing(){
  if(!editingClosingId) return;
  const vals = readClosingForm();
  if(!vals.date){ document.getElementById('closingErr').textContent = t('date_required'); return; }
  const r = computeClosing(vals, editingClosingId);
  try{
    await db.collection('freechoice_closings').doc(editingClosingId).update({
      ...vals, prevTill: r.prevTill, coinsDiff: r.coinsDiff, income: r.income, cash: r.cash,
      editedBy: actorName(), editedAt: FieldValue.serverTimestamp()
    });
    editingClosingId = null;
    render();
  }catch(e){ showStorageError('closings', e); }
}

function onNoteImageChange(input){
  const file = input.files[0];
  if(!file){ pendingNoteImage = null; return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const maxW = 700;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width*scale); canvas.height = Math.round(img.height*scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      pendingNoteImage = canvas.toDataURL('image/jpeg',0.7);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

    </div>`).join('');
  return `
    <div class="toolbar"><div style="font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;">${t('notes_heading')}</div>
      <button class="btn ghost small" onclick="exportNotesJSON()">${t('export_btn')}</button></div>
    <div class="field" style="max-width:340px;"><label>${t('f_note_type')}</label>
      <div class="toggle">
        <button class="${noteType==='note'?'active':''}" onclick="setNoteType('note')">${t('note_type_note')}</button>
        <button class="${noteType==='refund'?'active out':''}" onclick="setNoteType('refund')">${t('note_type_refund')}</button>
      </div>
    </div>
    <div class="noteform">
      <div class="field"><label>${t('f_date')}</label><input id="n_date" type="date" value="${today}"></div>
      <div class="field"><label>${t('f_shift')}</label><select id="n_shift"><option value="M">${t('shift_m')}</option><option value="N">${t('shift_n')}</option></select></div>
      <div class="field"><label>${t('f_image')}</label><input id="n_image" type="file" accept="image/*" onchange="onNoteImageChange(this)"></div>
    </div>
    <div class="field"><label>${noteType==='refund'?t('f_text_refund'):t('f_text')}</label><textarea id="n_text" rows="2"></textarea></div>
    <div class="lockerr" id="noteErr"></div>
    <button class="btn" onclick="submitNote()">${t('notes_submit')}</button>
    <div style="margin-top:22px;">${list || `<div class="empty">${t('notes_empty')}</div>`}</div>
  `;
}
function setNoteType(v){ noteType = v; render(); }
async function submitNote(){
  const date = document.getElementById('n_date').value;
  const shift = document.getElementById('n_shift').value;
  const text = document.getElementById('n_text').value.trim();
  if(!text){ document.getElementById('noteErr').textContent = t('text_required'); return; }
  try{
    await db.collection('freechoice_notes').add({
      date, shift, text, type: noteType, image: pendingNoteImage || null, author: actorName(),
      time: new Date().toLocaleTimeString(lang==='ar'?'ar-EG':'en-GB', {hour:'2-digit',minute:'2-digit'}),
      ts: FieldValue.serverTimestamp()
    });
    pendingNoteImage = null;
    render();
  }catch(e){ showStorageError('notes', e); }
}

/* ---------- CHAT ---------- */
function renderChat(){
  const msgs = state.chat.map(m=>`
    <div class="msg"><div class="who">${escapeHtml(m.author)} · ${escapeHtml(m.time)}</div><div class="txt">${escapeHtml(m.text)}</div></div>
  `).join('');
  return `
    <div class="toolbar"><div style="font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;">${t('chat_heading')}</div>
      <button class="btn ghost small" onclick="exportChatJSON()">${t('export_btn')}</button></div>
    <div class="chatwrap">
      <div class="chatlist" id="chatList">${msgs || `<div class="empty">${t('chat_empty')}</div>`}</div>
      <div class="chatinput">
        <input id="c_msg" type="text" placeholder="${t('chat_placeholder')}" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn" onclick="sendChat()">${t('chat_send')}</button>
      </div>
    </div>
  `;
}
async function sendChat(){
  const input = document.getElementById('c_msg');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  try{
    await db.collection('freechoice_chat').add({
      author: actorName(), text,
      time: new Date().toLocaleTimeString(lang==='ar'?'ar-EG':'en-GB', {hour:'2-digit',minute:'2-digit'}),
      ts: FieldValue.serverTimestamp()
    });
  }catch(e){ showStorageError('chat', e); }
  const list = document.getElementById('chatList');
  if(list) list.scrollTop = list.scrollHeight;
}

/* ---------- shared ---------- */
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });

function goToTab(tab){ activeTab = tab; reqStatus = null; render(); }
function renderNotifBar(){
  const bar = document.getElementById('notifBar');
  if(!bar) return;
  const pendingCount = state.requests.filter(r=>!r.received).length;
  const now = new Date();
  const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
  const yesterdayStr = isoDate(yesterday);
  const yesterdayClosed = state.closings.some(c=>c.date===yesterdayStr);
  let html = '';
  if(pendingCount > 0 && activeTab!=='requestslog'){
    html += `<div class="notif warn" onclick="goToTab('requestslog')">📦 ${t('notif_pending', pendingCount)}</div>`;
  }
  if(!yesterdayClosed && activeTab!=='closing'){
    html += `<div class="notif alert" onclick="goToTab('closing')">🧾 ${t('notif_no_closing', yesterdayStr)}</div>`;
  }
  bar.innerHTML = html;
}

function render(){
  if(!isAuthed()){
    document.getElementById('navBar').style.display = 'none';
    document.getElementById('notifBar').innerHTML = '';
    document.getElementById('panel').innerHTML = renderLogin();
    updateHeaderUser();
    return;
  }
  document.getElementById('navBar').style.display = 'flex';
  renderNav();
  renderNotifBar();
  const panel = document.getElementById('panel');
  if(activeTab==='inventory') panel.innerHTML = renderInventoryTab();
  else if(activeTab==='roster') panel.innerHTML = renderRosterTab();
  else if(activeTab==='requests'){ panel.innerHTML = renderRequests(); setTimeout(renderReqHint,0); }
  else if(activeTab==='requestslog') panel.innerHTML = renderRequestsLog();
  else if(activeTab==='notes') panel.innerHTML = renderNotes();
  else if(activeTab==='chat'){ panel.innerHTML = renderChat(); const l=document.getElementById('chatList'); if(l) l.scrollTop = l.scrollHeight; }
  else if(activeTab==='closing'){ panel.innerHTML = renderClosing(); setTimeout(recalcClosing,0); }
  else if(activeTab==='report') panel.innerHTML = renderWeeklyReport();
  else if(activeTab==='backup') panel.innerHTML = renderBackupTab();
  else panel.innerHTML = renderSchedule();
  updateHeaderUser();
}

applyLangChrome();
loadAll();
</script>
</body>
</html>
